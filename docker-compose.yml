version: "3.9"

services:

  ###############################################
  # 🌐 WordPress (connexion à un MySQL externe)
  ###############################################
  wordpress:
    build: .
    container_name: "${PROJECT_NAME}_wordpress"

    depends_on: []

    environment:
      WORDPRESS_DB_HOST: "${DB_HOST}"
      WORDPRESS_DB_USER: "${DB_USER}"
      WORDPRESS_DB_PASSWORD: "${DB_PASSWORD}"
      WORDPRESS_DB_NAME: "${DB_NAME}"
      WORDPRESS_TABLE_PREFIX: "${DB_PREFIX}"
      WP_DOMAIN: "${WP_DOMAIN}"
      WP_DEBUG: "true"
      WP_DEBUG_LOG: "true"
      WP_DEBUG_DISPLAY: "false"
      SCRIPT_DEBUG: "false"

    volumes:
      - ./wp-content:/var/www/html/wp-content
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./wp-config.local.php:/var/www/html/wp-config.php

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}.rule=Host(`${WP_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}.tls=true"
      - "traefik.http.routers.${PROJECT_NAME}.tls.certresolver=myresolver"
      - "traefik.http.services.${PROJECT_NAME}.loadbalancer.server.port=80"
      
      # ⭐ Headers HTTPS pour WordPress
      - "traefik.http.middlewares.${PROJECT_NAME}-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.${PROJECT_NAME}-headers.headers.customrequestheaders.X-Forwarded-Host=${WP_DOMAIN}"
      
      # ⭐ Buffering
      - "traefik.http.middlewares.${PROJECT_NAME}-timeout.buffering.maxRequestBodyBytes=100000000"
      - "traefik.http.middlewares.${PROJECT_NAME}-timeout.buffering.memRequestBodyBytes=100000000"
      
      # ⭐ Appliquer les deux middlewares
      - "traefik.http.routers.${PROJECT_NAME}.middlewares=${PROJECT_NAME}-timeout,${PROJECT_NAME}-headers"

    networks:
      - docker_default


#################################################
# 🕸️ Réseau Docker — déjà existant
#################################################
networks:
  docker_default:
    external: true
    name: docker_default